version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sistema_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sistema_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sistema_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistema_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sistema_db
      SECRET_KEY: dev-secret-key-change-in-production
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sistema_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: sistema_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - sistema_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  sistema_net:
    driver: bridge
